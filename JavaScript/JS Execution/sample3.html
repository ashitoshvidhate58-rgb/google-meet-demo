<!DOCTYPE html>

<script>

// var variable
var userName = "Ashitosh";

// const variable
const company = "Madam Labs";

// let variable
let number = 3;

console.log("User Name:", userName);
console.log("Company:", company);

// Accidental Variable (without var/let/const)
accidentalVar = 20;
console.log(accidentalVar);

// Loop example
for (let i = 1; i <= 5; i++) {
    console.log("Loop number:", i);

    // Switch condition inside loop
    switch (i) {
        case 1:
            console.log("One");
            break;

        case 2:
            console.log("Two");
            break;

        case 3:
            console.log("Three");
            break;

        case 4:
            console.log("Four");
            break;

        case 5:
            console.log("Five");
            break;

        default:
            console.log("Other number");
    }
}


    </script>
