<script>

    function add(...numbers) {
  let sum = 0;

  for (let i=0; i<numbers.length; i++) {
    sum = sum + numbers[i];
  }

  return sum;
}

console.log(add(1,2));      // 3
console.log(add(1,2,3));    // 6
console.log(add(1,2,3,4));  // 10
console.log(add(1,2,3,4,5));  // 15

</script>
