 body {
    background-color: #202124;
    font-family: Arial, sans-serif;
    
}

.Main-Container {
    background-color: #2b2b2b;
    width: 280px;
    border-radius: 10px;
    padding: 10px;
    margin-left: 20px;
    margin-top: 10px;
}

.GooglePage{

    background-color: rgb(56, 56, 56);
    width: 350px;
    margin: auto;
}

#parcList {
    display: flex;
    flex-direction: column;
    gap: 8px;
    border: 2px solid gray;
    border-radius: 16px;
    overflow-y: auto;
    height: 500px;
    
}

.participant {
    padding: 10px;
    border-radius: 8px;
    color: white;
    font-size: 14px;
    width: 200px;
    text-align: left;
}

.participant:hover {
    background-color: #5f6368;
}

.searchBox input {
    width: 200px;
    padding: 8px;
    border-radius: 20px;
    border: none;
    outline: none;
}

.button, .button1 {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}

.button1 span{

     background-color: #2b2b2b;
     color: white;

}
.button button {
    background-color: #1a73e8;
    color: white;
    border: none;
    padding: 6px 10px;
    border-radius: 20px;
    cursor: pointer;
}

.text {
    color: gray;
    font-size: 12px;
    margin: 10px 0;
}
</style>

<script>
    
    const mainPage = document.getElementById('parcList');
    const participatants= [
        "Vidhya Skill School",

        "vikas vanve"
    ];
    
    
    for(let i=0; i<participatants.length; i++)
    {
    const name = participatants[i];
    const parc = document.createElement('div');
    parc.classList.add("participant");
    parc.innerHTML=name;

    mainPage.appendChild(parc);
