        rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: "Quicksand", sans-serif;
            background: #f6f6f6;
        }

        /* HEADER */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: white;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #6b2bd9;
        }

        .location {
            font-size: 13px;
            color: #444;
            margin-left: 10px;
        }

        .search {
            flex: 1;
            margin: 0 20px;
        }

        .search input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .actions {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }

        /* GRID */
        #product-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            padding: 20px;
        }

        /* CARD */
        .box-item {
            background: white;
            border-radius: 12px;
            padding: 12px;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
        }

        .box-item:hover {
            transform: translateY(-4px);
        }

        .primary-container {
            position: relative;
            display: flex;
            justify-content: center;
        }

        .box-item-img {
            height: 140px;
            object-fit: contain;
        }

        .add-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #ff2c7d;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
            font-weight: 600;
            cursor: pointer;
        }

        /* PRICE */
        .price-row {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-top: 8px;
        }

        .price {
            font-weight: 700;
            font-size: 18px;
        }

        .original-price {
            text-decoration: line-through;
            color: gray;
            font-size: 13px;
        }

        .discount {
            color: green;
            font-size: 12px;
            font-weight: 600;
        }

        /* TEXT */
        .item-name {
            font-size: 14px;
            font-weight: 600;
            margin: 6px 0;
        }

        .item-pack-size {
            font-size: 12px;
            color: gray;
        }

        .item-variant {
            font-size: 11px;
            background: #eef6ff;
            padding: 4px 6px;
            border-radius: 6px;
            display: inline-block;
            margin-top: 4px;
        }

        .item-rating-review-container {
            margin-top: 6px;
            font-size: 12px;
            background: #e5faec;
            padding: 4px 6px;
            border-radius: 6px;
            width: fit-content;
        }

        #cart-container {
            position: fixed;
            right: 20px;
            top: 70px;
            background: white;
            z-index: 1000;
            width: 300px;
            display: none;
            /* 👈 important */
            border: 1px solid black;
            padding: 10px;
        }

        #cart-items div {
            font-size: 14px;
            margin-bottom: 6px;
        }

        #cart-icon {
            position: fixed;
            right: 20px;
            top: 20px;
            background: #ff3269;
            color: white;
            padding: 10px 14px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            z-index: 1000;
        }
    </style>
</head>




<body>

</body>

    const productListContainer = document.getElementById("product-list");
    const cartItemsContainer = document.getElementById("cart-items");
    const cartTotalElem = document.getElementById("cart-total");
    const cartCountElem = document.getElementById("cart-count");

    // Initialize basket from localStorage or as an empty array
    let basket = JSON.parse(localStorage.getItem("cart")) || [];

    function saveCart() {
        localStorage.setItem("cart", JSON.stringify(basket));
    }

    function renderCart() {
        cartItemsContainer.innerHTML = ""; // Clear existing cart items
        let total = 0;
        let totalItems = 0;

        if (basket.length === 0) {
            cartItemsContainer.innerHTML = "<p>Your cart is empty.</p>";
        } else {
            basket.forEach((item, index) => {
                const div = document.createElement("div");
                div.classList.add("cart-item");

                const itemDetails = document.createElement("span");
                itemDetails.innerText = `${item.name.slice(0, 20)}... - ₹${item.price}`;

                const qtyContainer = document.createElement("div");
                qtyContainer.classList.add("qty-container");

                const minusBtn = document.createElement("button");
                minusBtn.innerText = "-";
                // Added a class for styling if needed
                minusBtn.classList.add("qty-btn");
                minusBtn.onclick = () => {
                    item.quantity--;
                    if (item.quantity === 0) {
                        basket.splice(index, 1); // Remove item if quantity drops to 0
                    }
                    saveCart();
                    renderCart();
                };

                const qtyText = document.createElement("span");
                qtyText.innerText = item.quantity;

                const plusBtn = document.createElement("button");
                plusBtn.innerText = "+";
                // Added a class for styling if needed
                plusBtn.classList.add("qty-btn");
                plusBtn.onclick = () => {
                    item.quantity++;
                    saveCart();
                    renderCart();
                };

                qtyContainer.append(minusBtn, qtyText, plusBtn);

                const itemTotalPrice = document.createElement("span");
                itemTotalPrice.innerText = `₹${(item.price * item.quantity).toFixed(2)}`;
                itemTotalPrice.style.marginLeft = '10px'; // Add some spacing

                div.append(itemDetails, qtyContainer, itemTotalPrice);
                cartItemsContainer.appendChild(div);

                total += item.price * item.quantity;
                totalItems += item.quantity;
            });
        }

        //delivery free if total grater than 150.

        let deliveryCharge = 0;
        let finalTotal = total;

        if (total < 150 && total > 0) {
            deliveryCharge = 50;
            finalTotal = finalTotal + deliveryCharge;
        }

        if (basket.length === 0) {
            cartTotalElem.innerText = "";
        } else {
            cartTotalElem.innerHTML = `
        Subtotal: ₹${total.toFixed(2)} <br>
        Delivery: ${deliveryCharge === 0 ? "FREE" : "₹" + deliveryCharge} <br>
        <strong>Total: ₹${finalTotal.toFixed(2)}</strong>
    `;
        }

     cartCountElem.innerText = totalItems;
    }

    function toggleCart() {
        const cart = document.getElementById("cart-container");

        if (cart.style.display === "none" || cart.style.display === "") {
            cart.style.display = "block";
        } else {
            cart.style.display = "none";
        }
    }

    // This function is no longer needed as we're not navigating to a new page
    // function goToCart() {
    //     window.location.href = "cart.html";
    // }

    // Loop to render products
    for (let i = 0; i < products.length; i++) {
        const currentProduct = products[i];

        // Parent box element
        const parentBoxElem = document.createElement('div');
        parentBoxElem.classList.add("box-item");

        // Primary header container (Image and Add Button)
        const primaryHeaderContainer = document.createElement("div");
        primaryHeaderContainer.classList.add("primary-container");

        // Set an image inside the box
        const productImgElem = document.createElement("img");
        productImgElem.classList.add("box-item-img");
        productImgElem.src = currentProduct.image;
        primaryHeaderContainer.appendChild(productImgElem);

        // Add button
        const btn = document.createElement("button");
        btn.classList.add("add-btn");
        btn.innerText = "ADD";

        btn.addEventListener('click', () => {
            let productInCart = basket.find((item) => item.name === currentProduct.name);

            if (!productInCart) {
                basket.push({ ...currentProduct, quantity: 1 });
            } else {
                productInCart.quantity++;
            }
            saveCart(); // Save changes to local storage
            renderCart(); // Re-render the cart display
        });
        primaryHeaderContainer.appendChild(btn);
        parentBoxElem.appendChild(primaryHeaderContainer);


        // Secondary body container (Product details)
        const secondaryHeaderContainer = document.createElement("div");
        secondaryHeaderContainer.classList.add("secondary-container"); // Added a class for potential styling

        // Price container
        const priceContainer = document.createElement("div");
        priceContainer.classList.add("price-container");
        priceContainer.textContent = `₹${currentProduct.price.toFixed(2)}`;
        secondaryHeaderContainer.appendChild(priceContainer);

        // Original Price and Discount (If available)
        if (currentProduct.original_price) {
            const originalPriceContainer = document.createElement("span"); // Changed to span for inline display
            originalPriceContainer.classList.add("original-price-container");
            originalPriceContainer.style.textDecoration = "line-through";
            originalPriceContainer.style.marginLeft = "10px";
            originalPriceContainer.textContent = `₹${currentProduct.original_price.toFixed(2)}`;
            priceContainer.appendChild(originalPriceContainer); // Append to priceContainer to keep it together
        }

        if (currentProduct.discount) {
            const discountPriceContainer = document.createElement("span"); // Changed to span for inline display
            discountPriceContainer.classList.add("discount-price-container");
            discountPriceContainer.style.color = "red";
            discountPriceContainer.style.marginLeft = "10px";
            discountPriceContainer.textContent = `${currentProduct.discount}% off`;
            priceContainer.appendChild(discountPriceContainer); // Append to priceContainer
        }

        // Name container
        const productNameElem = document.createElement("p");
        productNameElem.classList.add("item-name");
        productNameElem.textContent = currentProduct.name;
        secondaryHeaderContainer.appendChild(productNameElem);

        // Brand container
        const productBrandNameElem = document.createElement("p");
        productBrandNameElem.classList.add("item-brand-name");
        productBrandNameElem.textContent = currentProduct.brand;
        secondaryHeaderContainer.appendChild(productBrandNameElem);

        // Pack size container
        const packSizeElem = document.createElement("p");
        packSizeElem.classList.add("item-pack-size");
        packSizeElem.textContent = currentProduct.pack_size;
        secondaryHeaderContainer.appendChild(packSizeElem);

        // Variant container
        if (currentProduct.variant) {
            const variantElem = document.createElement("div");
            variantElem.classList.add("item-variant");
            variantElem.textContent = currentProduct.variant;
            secondaryHeaderContainer.appendChild(variantElem);
        }

        // Rating & Review container
        const ratingAndReviewContainer = document.createElement("div");
        ratingAndReviewContainer.classList.add("item-rating-review-container");

        const ratingElem = document.createElement("div");
