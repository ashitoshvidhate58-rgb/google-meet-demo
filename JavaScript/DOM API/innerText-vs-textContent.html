<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnerText vs TextContent</title>
</head>

<body>
    <p id="para">Hello Aviral,
        How are you doing?
        Is everything okay?
    </p>
</body>

</html>

<script>
    const paraElem = document.getElementById("para");
    console.log("ParaElem text", paraElem.textContent);
    console.log("ParaElem innerText", paraElem.innerText);
</script>
