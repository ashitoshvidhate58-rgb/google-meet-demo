<script>

arr=[8,7,10,9,15,11];

let max=arr[0];

for(let i=0;i<arr.length;i++){

    const currVal=arr[i];
    if(currVal>max){
        max=currVal;
    }
}
console.log(max);





 const input = [1, 4, 6, 10, 3, 10, 11, 2, 4, 2, 222, 2, 220];

let maxNo = input[0]; // 1
let secondMaxNo = "";
let thirdMaxNo = "";

for (let i = 0; i < input.length; i++) {
  const currVal = input[i];
  if (currVal > maxNo) {
    thirdMaxNo = secondMaxNo;
    secondMaxNo = maxNo;
    maxNo = currVal;
  } else if (currVal > secondMaxNo && currVal < maxNo) {
    thirdMaxNo = secondMaxNo;
    secondMaxNo = currVal;
  } else if (currVal > thirdMaxNo && currVal < secondMaxNo) {
    thirdMaxNo = currVal;
  }
}

console.log({ maxNo, secondMaxNo, thirdMaxNo }); 


</script>
